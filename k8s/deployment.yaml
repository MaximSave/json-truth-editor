apiVersion: v1
kind: Namespace
metadata:
  name: json-editor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: editor-data-pvc
  namespace: json-editor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: json-truth-editor
  namespace: json-editor
  labels:
    app: json-truth-editor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: json-truth-editor
  template:
    metadata:
      labels:
        app: json-truth-editor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: editor
          image: registry.example.com/json-truth-editor:latest  # <-- update registry
          ports:
            - containerPort: 8000
          env:
            - name: MAX_UPLOAD_MB
              value: "50"
            - name: WORKERS
              value: "2"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: editor-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: json-truth-editor
  namespace: json-editor
spec:
  selector:
    app: json-truth-editor
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
